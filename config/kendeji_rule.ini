; ==========================================================
; 5) 节点组：KFC
; ==========================================================
; KFC 使用 KFC/kfc 正向匹配。
; KFC 常规组排除 AWS/aws 与低倍率，避免混入 AWS 来源组。
; 地区匹配只使用中文地区名和地区缩写：HK / TW / JP / SG / US。
