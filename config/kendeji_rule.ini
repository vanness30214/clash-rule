; ==========================================================
; KFC + AWS + SS 独立规则
; 基于 config/metafenliu.ini 精简生成
; ==========================================================
; 设计说明：
; - 普通厂商只保留 KFC。
; - AWS 来源组保留，匹配 AWS/aws 与低倍率节点；不再保留 Anrun、良心云独立组。
; - 中转 / 链式落地只保留 SS，不保留 Trojan。
; - 链式落地 / 中转只使用香港 / 日本 / 美国三个地区。
; - 业务策略组只引用：DIRECT、🔗 自建住宅-SS链式落地、KFC-*、AWS-*、REJECT。
; - 所有厂商/地区节点组保留 []REJECT 兜底，避免空匹配被转换器兜底成 DIRECT。
; ==========================================================

; ==========================================================
; 1) 规则组（域名组 → 策略组）
; ==========================================================

; --- Google Play 下载/更新修复：必须早于 GEOSITE,cn / GEOIP,cn / google-cn ---
;ruleset=🔍 Google Play,https://raw.githubusercontent.com/vanness30214/clash-rule/main/config/customize-google-play.list
ruleset=🔍 Google Play,clash-classic:https://raw.githubusercontent.com/vanness30214/clash-rule/main/config/customize-google-play.yaml,86400

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; ==========================================================
; 2) 核心应用分流
; ==========================================================

; --- AI 服务 ---
ruleset=✨ ChatGPT,[]GEOSITE,openai
ruleset=✨ Gemini,[]GEOSITE,google-gemini
ruleset=✨ Claude,[]GEOSITE,anthropic
ruleset=✨ Meta AI,https://raw.githubusercontent.com/liandu2024/clash/main/list/MetaAi.list
ruleset=✨ Perplexity,https://raw.githubusercontent.com/liandu2024/clash/main/list/Perplexity.list
ruleset=✨ AI,[]GEOSITE,category-ai-!cn

; --- 社交 / 通讯 ---
ruleset=🙋 Telegram,[]GEOSITE,telegram
ruleset=🙋 Telegram,[]GEOIP,telegram,no-resolve
ruleset=🪂 TikTok,[]GEOSITE,tiktok
ruleset=🪂 TikTok,[]GEOIP,tiktok,no-resolve
ruleset=🕊️ Twitter(X),[]GEOSITE,twitter
ruleset=💬 Instagram,[]GEOSITE,instagram
ruleset=🗣️ Facebook,[]GEOSITE,facebook
ruleset=💁 WhatsApp,[]GEOSITE,category-communication
ruleset=💬 Pinterest,[]GEOSITE,pinterest
ruleset=💬 Reddit,[]GEOSITE,reddit
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn

; --- 视频流媒体 ---
ruleset=🎞️ YouTube,[]GEOSITE,youtube

; --- 开发工具 ---
ruleset=📘 GitHub,[]GEOSITE,github
ruleset=📘 GitHub,[]GEOIP,github,no-resolve

; --- 科技巨头 ---
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🔍 Google,[]GEOSITE,google
ruleset=🔍 Google,[]GEOIP,google,no-resolve
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=Ⓜ️ Microsoft,[]GEOIP,microsoft,no-resolve

; --- 游戏 ---
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🕹️ Game,[]GEOSITE,category-games

; --- 电商 ---
ruleset=🌳 Amazon,[]GEOSITE,amazon
ruleset=🌳 Amazon,[]GEOIP,cloudfront,no-resolve
ruleset=🛒 Shopify,[]GEOSITE,shopify
ruleset=💳 Paypal,[]GEOSITE,paypal

; --- 加密货币 ---
ruleset=👌 Crypto,[]GEOSITE,okx
ruleset=👌 Crypto,[]GEOSITE,binance
ruleset=👌 Crypto,[]GEOSITE,bybit
ruleset=👌 Crypto,clash-classic:https://raw.githubusercontent.com/vanness30214/clash-rule/main/config/customize-crypto.yaml,86400

; --- Cloudflare ---
ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

; --- 测速 ---
ruleset=⏱️ Test,[]GEOSITE,category-speedtest
ruleset=⏱️ Test,[]DOMAIN-KEYWORD,speedtest

; --- GFW 列表（国外代理）---
ruleset=🌍 国外,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🌍 国外,[]FINAL

; ==========================================================
; 3) 策略组：SS 链式落地 / 中转选择
; ==========================================================

