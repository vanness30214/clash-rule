;1、域名组
; ==========================================================
; GEOSITE/GEOIP 原生规则版本（兼容 mihomo/Clash Meta）
; 规则与策略组严格对齐
;
; 自建住宅链式落地说明：
; - 原始自建住宅节点只作为落地使用，不进入普通节点组
; - Sub-Store 脚本负责复制生成：
;   链式｜SS｜xxx自建住宅
;   链式｜Trojan｜xxx自建住宅
; - 所有普通节点入口均按厂商划分，不再使用普通地区聚合组
; - 链式落地 / 中转只使用香港 / 日本 / 美国三个地区
; - AWS 节点只按 AWS / aws 字样识别
; - 不再使用总入口：🔗 自建住宅-链式落地
; ==========================================================

; ==========================================================
; 1) 规则组（域名组 → 策略组）
; ==========================================================

; --- Google Play 下载/更新修复：必须早于 GEOSITE,cn / GEOIP,cn / google-cn ---
