[custom]
; ==========================================================
; 🚀 A++ FINAL · 工业级分流（修复HK + AI完整 + 高兼容）
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true


; ==========================================================
; 🧹 节点清洗
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|电报|群|频道|说明|客服|工单|Expire|Traffic|Reset|Remaining|Official|Website


; ==========================================================
; 1️⃣ GEO 规则层（核心）
; ==========================================================

ruleset=🟥 Adobe,[]GEOSITE,adobe

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker


; =========================
; 核心应用
; =========================

ruleset=📦 Notion,[]GEOSITE,notion
ruleset=📨 Telegram,[]GEOSITE,telegram

ruleset=🤖 ChatGPT,[]GEOSITE,openai

ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

ruleset=🍎 Apple,[]GEOSITE,apple

ruleset=🎬 YouTube,[]GEOSITE,youtube

ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter

ruleset=🛠 GitHub,[]GEOSITE,github

ruleset=🎮 Steam,[]GEOSITE,steam


; =========================
; 🧠 AI 精细分流（完整）
; =========================

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🟦 Copilot,[]GEOSITE,microsoft
ruleset=🟨 Gemini,[]GEOSITE,google
ruleset=🟩 Meta AI,[]GEOSITE,facebook

ruleset=🟪 Claude,clash-domain:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list,86400

ruleset=🟧 Perplexity,clash-domain:https://raw.githubusercontent.com/liandu2024/clash/main/list/Perplexity.list,86400

ruleset=🧠 AI,clash-domain:https://raw.githubusercontent.com/liandu2024/clash/main/list/AI.list,86400


; ==========================================================
; 🌐 兜底规则
; ==========================================================

ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🐟 漏网之鱼,[]FINAL



; ==========================================================
; 2️⃣ 节点识别（已修复 HK 不识别问题）
; ==========================================================

custom_proxy_group=🇭🇰 HK`url-test`(?i)(香港|HK|HKG|Hong\s*Kong|HongKong|HK[-\s_]*\d+|HKG[-\s_]*\d+|HK\d+|CMHK|HKT|PCCW|xianggang|xg|港)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇹🇼 TW`url-test`(?i)(台湾|台灣|TW|Taiwan|Taipei|hinet|TW[-\s_]*\d+|🇹🇼)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 JP`url-test`(?i)(日本|JP|Japan|Tokyo|Osaka|JP[-\s_]*\d+|🇯🇵)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇸🇬 SG`url-test`(?i)(新加坡|SG|Singapore|SG[-\s_]*\d+|🇸🇬)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇺🇸 US`url-test`(?i)(美国|US|United\s*States|Los\s*Angeles|New\s*York|San\s*Jose|Seattle|US[-\s_]*\d+|🇺🇸)`http://www.gstatic.com/generate_204`300,,50



; ==========================================================
; 🧊 冷门节点（自动排除五大区）
; ==========================================================

custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(香港|HK|HKG|日本|JP|台湾|TW|新加坡|SG|美国|US|Hong|Tokyo|Taipei|Singapore|United)).*



; ==========================================================
; 3️⃣ 应用策略组（简洁稳定版）
; ==========================================================

custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 US`[]🇯🇵 JP`[]🇭🇰 HK`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🟦 Copilot`select`[]🇺🇸 US`[]🇯🇵 JP`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🟨 Gemini`select`[]🇺🇸 US`[]🇯🇵 JP`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🟪 Claude`select`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🟩 Meta AI`select`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default

custom_proxy_group=📦 Notion`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=📨 Telegram`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🍎 Apple`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT`[]🌐 Default
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🎥 Netflix`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🎵 TikTok`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=📸 Instagram`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🐦 X`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🛠 GitHub`select`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default
custom_proxy_group=🎮 Steam`select`[]DIRECT`[]🇭🇰 HK`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🌐 Default



; ==========================================================
; 4️⃣ Default / 自动 / 兜底
; ==========================================================

custom_proxy_group=🌐 Default`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]DIRECT

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]DIRECT

custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]♻️ 自动选择`[]🧊 冷门节点`[]DIRECT
