;1、域名组
; ==========================================================
; GEOSITE/GEOIP 原生规则版本（兼容 mihomo/Clash Meta）
; 规则与策略组严格对齐
; ==========================================================

; ==========================================================
; 1) 规则组（域名组 → 策略组）
; ==========================================================

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; ==========================================================
; 2) 核心应用分流
; ==========================================================

; --- AI 服务 ---
ruleset=✨ ChatGPT,[]GEOSITE,openai
ruleset=✨ AI,[]GEOSITE,category-ai-!cn
; Claude / Meta AI / Perplexity 无 GEOSITE 分类，保留 URL 兜底
ruleset=✨ Claude,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list
ruleset=✨ Meta AI,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/MetaAi.list
ruleset=✨ Perplexity,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/Perplexity.list

; --- 社交 / 通讯 ---
ruleset=🙋 Telegram,[]GEOSITE,telegram
ruleset=🙋 Telegram,[]GEOIP,telegram,no-resolve

ruleset=🪂 TikTok,[]GEOSITE,tiktok
ruleset=🪂 TikTok,[]GEOIP,tiktok,no-resolve

ruleset=🕊️ Twitter(X),[]GEOSITE,twitter
; Instagram 无独立 GEOSITE，归入社交媒体
ruleset=💬 社交媒体,[]GEOSITE,instagram
ruleset=🗣️ Facebook,[]GEOSITE,facebook
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=💁 WhatsApp,[]GEOSITE,category-communication

; --- 视频流媒体 ---
ruleset=🎞️ YouTube,[]GEOSITE,youtube
; Disney / HBO / Spotify 无 GEOSITE 分类，保留 URL（默认注释）
; ruleset=📺 Disney,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list
; ruleset=🎬 HBO,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/HBO/HBO.list
; ruleset=🎵 Spotify,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.list

; --- 开发工具 ---
ruleset=📘 GitHub,[]GEOSITE,github
ruleset=📘 GitHub,[]GEOIP,github,no-resolve

; --- 科技巨头 ---
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🔍 Google,[]GEOSITE,google
ruleset=🔍 Google,[]GEOIP,google,no-resolve
ruleset=Ⓜ️ Microsoft,[]GEOSITE,microsoft
ruleset=Ⓜ️ Microsoft,[]GEOIP,microsoft,no-resolve
; Copilot 属于 Microsoft，Gemini 属于 Google，归入对应分组

; --- 游戏 ---
ruleset=🎮 Steam,[]GEOSITE,steam
; Epic/EA/Blizzard/UBI/Sony/Nintendo 合并到游戏大类
ruleset=🕹️ Game,[]GEOSITE,category-games
; 如需精确分流，取消下方注释：
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Epic/Epic.list
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/EA/EA.list
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Blizzard/Blizzard.list
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/UBI/UBI.list
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Sony/Sony.list
; ruleset=🕹️ Game,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Nintendo/Nintendo.list

; --- 电商 ---
; Amazon 无 GEOSITE 分类，保留 URL
ruleset=🌳 Amazon,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Amazon/Amazon.list

; --- 加密货币 ---
ruleset=👌 Crypto,[]GEOSITE,okx
ruleset=👌 Crypto,[]GEOSITE,binance
ruleset=👌 Crypto,[]GEOSITE,bybit
; 其他交易所保留 URL
ruleset=👌 Crypto,https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/xnb.list

; --- Cloudflare ---
;ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
;ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

; --- 测速 ---
ruleset=⏱️ Test,[]GEOSITE,category-speedtest

; ==========================================================
; 3) 兜底规则
; ==========================================================

; --- GFW 列表（国外代理）---
ruleset=🌍 国外,[]GEOSITE,gfw

; --- 最终兜底 ---
ruleset=🌍 国外,[]FINAL

