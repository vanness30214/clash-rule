; ==========================================================
; 3) 策略组（与域名组严格一一对应）
; ==========================================================

; ----------------------------------------------------------
; 自建住宅链式落地：SS 专用
; ----------------------------------------------------------
; SS 落地可给普通机场 / AnyTLS / AWS 地区中转使用
; 不放良心云，避免良心云搭配 SS 落地超时
; ----------------------------------------------------------
custom_proxy_group=🔗 自建住宅-SS链式落地`select`链式｜SS｜.*自建住宅`
custom_proxy_group=🔁 中转选择｜US-NTT-自建住宅-SS`select`[]香港-自动`[]日本-自动`[]美国-自动`[]AWS-香港-自动`[]AWS-日本-自动`[]AWS-美国-自动`[]所有-手动`

; ----------------------------------------------------------
; 良心云链式中转专用组
; ----------------------------------------------------------
; 只收录良心云 VLESS，并且只收录香港 / 日本 / 美国
; 避免 Hysteria2 / 其他地区节点进入链式中转
; ----------------------------------------------------------
custom_proxy_group=良心云-链式中转-手动`select`^(?=.*良心云)(?=.*VLESS)(?=.*(香港|HK|Hong Kong|🇭🇰|日本|JP|Japan|🇯🇵|美国|美國|US|United States|🇺🇸)).*
custom_proxy_group=良心云-链式中转-自动`url-test`^(?=.*良心云)(?=.*VLESS)(?=.*(香港|HK|Hong Kong|🇭🇰|日本|JP|Japan|🇯🇵|美国|美國|US|United States|🇺🇸)).*`http://www.gstatic.com/generate_204`180,5,100

