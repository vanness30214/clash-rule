; ==========================================================
; 3) 策略组（与域名组严格一一对应）
; ==========================================================

; ----------------------------------------------------------
; 自建住宅链式落地：SS 专用
; ----------------------------------------------------------
; 只收录 Sub-Store 生成的 SS 链式自建住宅落地节点
; 只匹配香港 / 日本 / 美国三个地区
; ----------------------------------------------------------
custom_proxy_group=🔗 自建住宅-SS链式落地`select`^(?=.*链式｜SS｜)(?=.*自建住宅)(?=.*(香港|日本|美国|美國|(?:^|[^A-Za-z])(?:HK|hk|JP|jp|US|us)(?:[^A-Za-z]|$))).*
