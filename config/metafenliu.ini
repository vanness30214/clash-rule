;1、域名组
; ==========================================================
; GEOSITE/GEOIP 原生规则版本（兼容 mihomo/Clash Meta）
; 规则与策略组严格对齐
;
; 自建住宅链式落地说明：
; - 原始自建住宅节点只作为落地使用，不进入普通节点组
; - Sub-Store 脚本负责复制生成：
;   链式｜SS｜xxx自建住宅
;   链式｜Trojan｜xxx自建住宅
; - SS 链式落地走普通机场 / AnyTLS / AWS 地区中转
; - Trojan 链式落地走良心云 VLESS / AWS 地区中转
; - AWS 节点单独按香港 / 日本 / 美国分组，不进入普通机场组
; - 不再使用总入口：🔗 自建住宅-链式落地
; ==========================================================

; ==========================================================
; 1) 规则组（域名组 → 策略组）
; ==========================================================

; --- Google Play 下载/更新修复：必须早于 GEOSITE,cn / GEOIP,cn / google-cn ---
ruleset=🔍 Google Play,[]DOMAIN,services.googleapis.cn
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,googleapis.cn
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,googleapis.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,gvt1.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,gvt2.com
ruleset=🔍 Google Play,[]DOMAIN,android.clients.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients1.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients2.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients3.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients4.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients5.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,clients6.google.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,googleusercontent.com
ruleset=🔍 Google Play,[]DOMAIN-SUFFIX,ggpht.com

; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; ==========================================================
