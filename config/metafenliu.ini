;1、域名组
; ==========================================================
; GEOSITE/GEOIP 原生规则版本（兼容 mihomo/Clash Meta）
; 规则与策略组严格对齐
;
; AI 维护说明：
; - 本文件就是后续 AI 修改规则时必须优先读取的“规则说明 + 完整配置”入口文件。
; - 后续任何 AI 在修改本文件前，必须先完整读取本说明区和现有 custom_proxy_group 结构，不能只按单次对话记忆猜测规则。
; - 每次修改规则后，必须同步更新本说明区，确保这里记录的厂商、地区、链式代理、AWS 来源、低倍率归类、兜底策略与实际规则一致。
; - 若新增厂商，只新增该厂商自己的正向匹配组，并把业务策略组直接引用到该厂商组；不要回头给旧厂商增加“排除其他厂商”的负向规则。
; - 若新增 / 删除地区，必须同时修改：厂商地区组、其他地区排除片段、链式中转候选、业务策略组候选。
; - 若发现空匹配被转换器兜底成 DIRECT，必须优先使用 []REJECT 显式兜底，避免 UI 误显示可用延迟。
; - AI 可以在保持上述约束的前提下，自行读取、修改、完善规则细节；但不得删除原有 ruleset 与业务策略组，除非用户明确要求。
;
; 当前规则设计：
; - 所有普通节点入口均按厂商划分，不再使用普通地区聚合组。
; - 普通厂商当前为：KFC、Anrun。
; - KFC 统一使用短名称；匹配关键词围绕 KFC / kfc，不再匹配中文旧名。
; - Anrun 统一使用短名称；匹配关键词围绕 Anrun / anrun。
; - 良心云作为独立厂商组，只正向匹配“良心云”。
; - AWS 作为“来源型节点组”：匹配节点名带 AWS / aws 的节点，也匹配良心云节点，也匹配低倍率节点。
; - AWS 组不匹配 Amazon / 亚马逊 / 亞馬遜，避免把普通 Amazon 字样误判为 AWS 节点。
; - 若未来新增其他“服务器来源为 AWS、但节点名不含 AWS/aws”的厂商，可把该厂商关键词加入 AWS 来源组匹配片段，而不是修改普通厂商组。
; - 低倍率节点统一归入 AWS 来源组，不再保留任何独立低倍率分组。
; - 低倍率常见关键词：低倍率 / 低倍 / 0.xx / 0.xX / 0.x倍 / 0.x倍率。
; - KFC与 Anrun 常规厂商组必须排除 AWS / aws 和低倍率，避免厂商地区组混入应归入 AWS 的节点。
; - 良心云常规厂商组必须排除低倍率，但不排除良心云本身；良心云节点同时会进入 AWS 来源组。
; - 厂商之间原则上只使用正向匹配，不互相排除；但 AWS / aws 与低倍率属于“来源/倍率归类”，允许从普通厂商组中排除。
; - 常规业务分组保留地区：香港 / 台湾 / 日本 / 新加坡 / 美国 / 其他。
; - 常规业务地区匹配只使用中文地区名和地区缩写：HK / TW / JP / SG / US；不匹配国旗、城市名、英文全称。
; - 其他地区表示：不属于香港 / 台湾 / 日本 / 新加坡 / 美国的同厂商节点。
; - 韩国、英国、德国、法国、加拿大、澳大利亚等全部归入其他地区。
; - 链式落地 / 中转只使用香港 / 日本 / 美国三个地区，不使用台湾 / 新加坡 / 其他地区。
; - 已取消普通地区聚合组：香港-自动、台湾-自动、日本-自动、新加坡-自动、美国-自动、其他-自动。
; - 已取消韩国独立组。
; - 已取消良心云链式中转专用组。
; - 已取消所有低倍率独立组。
; - 所有厂商/地区节点组内置 REJECT 兜底，避免空匹配被转换器兜底成 DIRECT。
;
; 自建住宅链式落地说明：
; - 原始自建住宅节点只作为落地使用，不进入普通节点组。
; - Sub-Store 脚本负责复制生成：
;   链式｜SS｜xxx自建住宅
;   链式｜Trojan｜xxx自建住宅
; - 自建住宅 SS / Trojan 链式落地组只匹配香港 / 日本 / 美国三个地区。
; - 链式中转选择只直接引用各厂商的香港 / 日本 / 美国地区组。
; - 链式中转候选中的 AWS 香港 / 日本 / 美国，会同时覆盖自建 AWS、节点名带 AWS/aws 的节点、良心云对应地区节点、低倍率对应地区节点。
; - 不再使用总入口：🔗 自建住宅-链式落地。
; ==========================================================

